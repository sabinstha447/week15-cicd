trigger:
  branches:
    include:
      - main

pool:
  name: Default

stages:

  - stage: Build
    displayName: 'Stage 1 - Build'
    jobs:
      - job: BuildJob
        displayName: 'Compile and Package Application'
        steps:
          - script: echo "Installing dependencies..."
            displayName: 'Step 1 - Install Dependencies'
          - script: npm run build
            displayName: 'Step 2 - Build Application'

  - stage: Test
    displayName: 'Stage 2 - Test'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: TestJob
        displayName: 'Run Automated Tests'
        steps:
          - script: npm test
            displayName: 'Step 1 - Run Unit Tests'

  - stage: Deploy
    displayName: 'Stage 3 - Deploy'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: DeployJob
        displayName: 'Deploy Application'
        steps:
          - script: |
              echo "============================="
              echo " DEPLOYMENT CONFIRMATION"
              echo "============================="
              echo " Build ID   : $(Build.BuildId)"
              echo " Branch     : $(Build.SourceBranchName)"
              echo " Triggered  : $(Build.RequestedFor)"
              echo " Status     : SUCCESS"
              echo "============================="
            displayName: 'Step 1 - Print Deployment Confirmation'
